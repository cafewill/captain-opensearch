spring.application.name=my-app
spring.profiles.active=local

# OpenSearch 연결
opensearch.url=https://localhost:9200
opensearch.index=logs-${spring.application.name}-{date}

# SSL (내부망 자가 서명 인증서)
opensearch.trust-all-ssl=true

# Writer thread
# false: logback-elasticsearch 호환 방식. 이벤트 발생 시 writer thread 기동, idle 시 종료
# true: daemon writer thread 1개를 appender 생명주기 동안 유지
opensearch.persistent-writer-thread=false

# 타임스탬프 기준 타임존: Asia/Seoul
# timestampFormat 을 사용하는 경우 logback-spring.xml 에서 설정
