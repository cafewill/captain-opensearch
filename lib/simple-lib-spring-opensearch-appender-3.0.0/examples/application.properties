spring.application.name=my-app
spring.profiles.active=local

# OpenSearch 연결
opensearch.url=https://localhost:9200
opensearch.index=logs-${spring.application.name}-{date}

# SSL (내부망 자가 서명 인증서)
opensearch.trust-all-ssl=true

# 타임스탬프 기준 타임존: Asia/Seoul
# timestampFormat 을 사용하는 경우 logback-spring.xml 에서 설정
