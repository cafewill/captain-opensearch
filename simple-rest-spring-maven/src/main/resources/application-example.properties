spring.application.name=simple-rest-spring-maven
server.port=9201

# H2 In-Memory
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.sql.init.mode=always

# MyBatis
mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.type-aliases-package=com.cube.simple.model

# OpenSearch
opensearch.name=simple-rest-spring-maven
opensearch.env=local
opensearch.url=https://localhost:9200/_bulk
opensearch.username=admin
opensearch.password=Demo3543##
opensearch.trust-all-ssl=true
