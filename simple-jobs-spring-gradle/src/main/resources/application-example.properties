spring.application.name=simple-jobs-spring-gradle
server.port=9002

job.system.delay=3000
job.manager.delay=15000
job.operator.delay=20000

# OpenSearch
opensearch.name=simple-jobs-spring-gradle

# 운영 환경 구분 (local | dev | staging | prod)
opensearch.env=local

# OpenSearch 연결
opensearch.url=https://localhost:9200
opensearch.username=admin
opensearch.password=Demo3543##

# 배치 설정
opensearch.batch.max-bytes=1000000
opensearch.batch.max-size=200
opensearch.batch.max-message-size=32768
opensearch.batch.flush-interval-seconds=1
opensearch.batch.queue-size=8192
opensearch.connect-timeout-millis=3000
opensearch.read-timeout-millis=5000
opensearch.retry-initial-delay-millis=500
opensearch.retry-max-delay-millis=10000
opensearch.max-retries=3
opensearch.retry-partial-failures=true
opensearch.trust-all-ssl=true
opensearch.timestamp-zone=UTC
opensearch.include-mdc=true
opensearch.include-kvp=true
opensearch.operation=create
opensearch.errors-to-stderr=true
