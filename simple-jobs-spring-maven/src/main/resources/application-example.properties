spring.application.name=simple-jobs-spring-maven
server.port=9001

job.system.delay=3000
job.manager.delay=15000
job.operator.delay=20000
job.risky.delay=60000

# OpenSearch
opensearch.name=simple-jobs-spring-maven

# 운영 환경 구분 (local | dev | staging | prod)
opensearch.env=local

# OpenSearch 연결
opensearch.url=https://localhost:9200/_bulk
opensearch.username=admin
# 비밀번호는 Jasypt 암호화 필수 (ENC(...) 형식)
# 로컬 암호화: jasypt.encryptor.password 키로 암호화한 값 사용
# 운영 환경: JASYPT_ENCRYPTOR_PASSWORD 환경변수로 키 관리 권장
opensearch.password=ENC(AinSz01jh1I4dztG7DjklXvzX5J6+HG0)

# 배치 설정
opensearch.trust-all-ssl=true

# Jasypt 설정 (개발/로컬용 - 운영 환경에서는 JASYPT_ENCRYPTOR_PASSWORD 환경변수 사용)
jasypt.encryptor.password=captainkey
jasypt.encryptor.algorithm=PBEWithMD5AndDES
jasypt.encryptor.iv-generator-classname=org.jasypt.iv.NoIvGenerator
