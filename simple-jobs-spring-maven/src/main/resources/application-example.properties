spring.application.name=simple-jobs-spring-maven
server.port=9001

job.system.delay=3000
job.manager.delay=15000
job.operator.delay=20000

# OpenSearch
opensearch.name=simple-jobs-spring-maven

# 운영 환경 구분 (local | dev | staging | prod)
opensearch.env=local

# OpenSearch 연결
opensearch.host=localhost
opensearch.port=9200
opensearch.scheme=https
opensearch.username=admin
opensearch.password=Demo3543##

# 배치 설정
opensearch.batch.max-bytes=1000000
opensearch.batch.flush-interval-seconds=1
opensearch.batch.queue-size=8192
