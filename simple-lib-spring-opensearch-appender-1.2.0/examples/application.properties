# Legacy properties remain valid.
cube.opensearch.web.enabled=true
cube.opensearch.job.enabled=true

# Existing/legacy appender parameters can still be supplied in logback-spring.xml via ${...} placeholders.
opensearch.url=http://localhost:9200
opensearch.index=app-logs-{date}
opensearch.username=
opensearch.password=
opensearch.app=my-service
opensearch.env=local
opensearch.instance-id=
opensearch.max-batch-bytes=262144
opensearch.flush-interval-seconds=3
opensearch.queue-size=10000
opensearch.connect-timeout-millis=3000
opensearch.read-timeout-millis=5000
opensearch.retry-initial-delay-millis=500
opensearch.retry-max-delay-millis=10000
opensearch.max-retries=3
opensearch.retry-partial-failures=true
opensearch.trust-all-ssl=true
opensearch.dead-letter-logger-name=com.cube.opensearch.deadletter

# Added in 1.2.0. Optional. If omitted, defaults to UTC.
opensearch.timestamp-zone=Asia/Seoul
# Added in 1.2.0. Optional. Default true.
opensearch.include-mdc=true
