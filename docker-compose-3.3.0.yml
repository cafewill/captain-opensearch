services:

  opensearch330:
    image: opensearchproject/opensearch:3.3.0
    container_name: opensearch330
    environment:
      - discovery.type=single-node
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=Demo3543##
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    volumes:
      - opensearch330-data:/usr/share/opensearch/data
    networks:
      - opensearch330-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sk https://localhost:9200/_cluster/health -u admin:Demo3543## | grep -q 'yellow\\|green'"]
      interval: 15s
      timeout: 10s
      retries: 10

  opensearch-dashboards330:
    image: opensearchproject/opensearch-dashboards:3.3.0
    container_name: opensearch-dashboards330
    volumes:
      - ./opensearch-dashboards-3.3.0.yml:/usr/share/opensearch-dashboards/config/opensearch_dashboards.yml
    ports:
      - "5601:5601"
    networks:
      - opensearch330-net
    depends_on:
      opensearch330:
        condition: service_healthy

volumes:
  opensearch330-data:

networks:
  opensearch330-net:
    driver: bridge
